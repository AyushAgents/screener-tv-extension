<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TradingView</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f4f4f4; height: 100vh; display: flex; flex-direction: column; }

    #header {
      padding: 10px 12px;
      background: #1a73e8;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #open-tv {
      background: #fff;
      color: #1a73e8;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    #tv-frame {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="header">
    <span id="symbol-label">📈 TradingView</span>
    <button id="open-tv" onclick="openInNewTab()">↗ Open Full</button>
  </div>

  <iframe id="tv-frame" src="https://www.tradingview.com/chart/"></iframe>

  <script>
    let currentSymbol = "NSE:NIFTY";

    function openInNewTab() {
      window.open(`https://www.tradingview.com/chart/?symbol=${currentSymbol}`, "_blank");
    }

    // Poll for symbol updates from content.js
    function checkSymbol() {
      chrome.storage.session.get("tvSymbol", (data) => {
        if (data.tvSymbol && data.tvSymbol !== currentSymbol) {
          currentSymbol = data.tvSymbol;
          document.getElementById("symbol-label").innerText = `📈 ${currentSymbol}`;
          document.getElementById("tv-frame").src =
            `https://www.tradingview.com/chart/?symbol=${currentSymbol}`;
        }
      });
    }

    // Check every 1.5 seconds for symbol change
    setInterval(checkSymbol, 1500);
    checkSymbol();
  </script>
</body>
</html>
